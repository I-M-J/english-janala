<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Janala | English Learning Platform</title>

    <!-- Favicon -->
    <link rel="shortcut icon" href="assets/logo.png" type="image/x-icon">

    <!-- Font Awesome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- Tailwind CSS and Daisy UI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Tiro+Bangla:ital@0;1&display=swap"
        rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="styles/style.css">
</head>

<body>
    <nav class="bg-[#BADEFF]/26 border-b border-b-[#C6BDBD]">
        <div class="navbar py-4 max-w-9/10 mx-auto">
            <div class="flex-1">
                <a class="flex items-center text-xl leading-7">
                    <span class="font-semibold">English</span>

                    <div class="h-10 w-10">
                        <img src="assets/logo.png" alt="logo">
                    </div>

                    <span class="tiro-bangla-font font-normal">জানালা</span>
                </a>
            </div>

            <div class="dropdown">
                <div tabindex="0" role="button" class="btn btn-ghost lg:hidden">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M4 6h16M4 12h8m-8 6h16" />
                    </svg>
                </div>
                <ul tabindex="-1"
                    class="menu menu-sm dropdown-content bg-base-100 rounded-box z-1 mt-3 w-52 p-2 shadow -ml-36 gap-2">
                    <li><a class="btn btn-outline btn-primary h-full border-2 text-sm font-semibold leading-5.25 py-2"><i
                                class="fa-solid fa-circle-question"></i>FAQ</a></li>

                    <li><a class="btn btn-outline btn-primary h-full border-2 text-sm font-semibold leading-5.25 py-2"><i
                                class="fa-solid fa-book-open"></i>Learn</a></li>

                    <li><a
                            class="btn btn-outline btn-primary h-full border-2 text-sm font-semibold leading-5.25 py-2">Logout</a>
                    </li>
                </ul>
            </div>

            <div class="hidden lg:flex">
                <ul class="menu menu-horizontal gap-4">
                    <li><a class="btn btn-outline btn-primary h-full border-2 text-sm font-semibold leading-5.25 py-2"><i
                                class="fa-solid fa-circle-question"></i>FAQ</a></li>

                    <li><a class="btn btn-outline btn-primary h-full border-2 text-sm font-semibold leading-5.25 py-2"><i
                                class="fa-solid fa-book-open"></i>Learn</a></li>

                    <li><a class="btn btn-outline btn-primary h-full border-2 text-sm font-semibold leading-5.25 py-2"><i
                                class="fa-solid fa-arrow-right-from-bracket"></i>Logout</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- px-4 Extra over max width -->
    <header class="max-w-420 mx-auto px-4">
        <section class="flex justify-between flex-col-reverse py-8 lg:flex-row">
            <div class="hero-left max-w-180 flex items-center mx-auto lg:mx-0">
                <div>
                    <h2 class="text-5xl font-bold leading-12 text-[#18181B] mb-6"><span
                            class="text-[#00BCFF]">English</span> is
                        Easy!!</h2>

                    <p class="max-w-180 hind-siliguri-font text-2xl font-medium text-[#18181B] mb-10 text-justify">আজ
                        থেকেই আপনার
                        ভাষা শেখার
                        যাত্রা শুরু করুন। আপনি যদি নতুন হন অথবা আপনার দক্ষতা বাড়াতে চান, আমাদের
                        Interactive Lessons আপনাকে নিয়ে যাবে অন্য একটি Level এ</p>

                    <form class="flex flex-col items-start gap-5" action="">
                        <input class="text-base px-3 py-2.5 rounded w-full lg:w-1/2 border-[#18181B]/20" type="text"
                            name="" id="" placeholder="Enter Your Name">

                        <input class="text-base px-3 py-2.5 rounded w-full lg:w-1/2 border-[#18181B]/20" type="text"
                            name="" id="" placeholder="..................">

                        <input class="btn btn-primary font-semibold text-sm leading-5.25" type="submit"
                            value="Get Started">
                    </form>
                </div>
            </div>

            <div class="hero-right">
                <div class="max-w-180 mx-auto">
                    <img src="assets/hero-student.png" alt="">
                </div>
            </div>
        </section>
    </header>
</body>

</html>
